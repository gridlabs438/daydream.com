<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daydream | Official eSports Team</title>
    <style>
        /* 全体のリセットとダーク・近未来テーマ */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0d0c12;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ナビゲーションバー */
        header {
            background-color: rgba(13, 12, 18, 0.9);
            border-bottom: 1px solid #221f30;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo-text {
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #d946ef, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95em;
            font-weight: bold;
            transition: color 0.2s;
        }
        nav a:hover {
            color: #00e5ff;
        }

        /* ヒーローセクション（トップ大画面） */
        .hero {
            padding: 140px 20px 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1e1530 0%, #0d0c12 70%);
            border-bottom: 1px solid #221f30;
        }
        .team-logo-main {
            max-width: 100%;
            width: 550px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(217, 70, 239, 0.3));
            margin-bottom: 20px;
        }
        .hero p {
            color: #9ca3af;
            font-size: 1.2em;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        /* セクション共通 */
        .section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px;
        }
        .section-title {
            text-align: center;
            font-size: 2em;
            letter-spacing: 2px;
            margin-bottom: 40px;
            position: relative;
            text-transform: uppercase;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: #00e5ff;
            margin: 10px auto 0 auto;
        }

        /* メンバーカード（ロスター） */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }
        .member-card {
            background-color: #15131f;
            border: 1px solid #221f30;
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .member-card:hover {
            transform: translateY(-5px);
            border-color: #d946ef;
        }
        .member-role {
            font-size: 0.8em;
            color: #00e5ff;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .member-name {
            font-size: 1.3em;
            font-weight: bold;
            margin: 10px 0;
        }
        .btn-sns {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            border-radius: 20px;
            background-color: #221f30;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.85em;
        }
        .btn-sns:hover { background-color: #d946ef; color: white; }

        /* スポンサーセクション */
        .sponsors {
            background-color: #0a090f;
            border-top: 1px solid #1a1724;
            border-bottom: 1px solid #1a1724;
            text-align: center;
            padding: 60px 20px;
        }
        .sponsor-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .sponsor-card {
            background-color: #15131f;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #221f30;
            transition: border-color 0.2s;
        }
        .sponsor-card:hover {
            border-color: #ef4444; /* 鳥栄ロゴに合わせた赤アクセント */
        }
        .sponsor-logo {
            max-height: 70px;
            width: auto;
            display: block;
            border-radius: 4px;
        }

        /* フッター */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #4b5563;
            font-size: 0.85em;
            border-top: 1px solid #1a1724;
        }
    </style>
</head>
<body>

    <!-- ヘッダーナビゲーション -->
    <header>
        <div class="nav-container">
            <div class="logo-text">DAYDREAM</div>
            <nav>
                <a href="#home">HOME</a>
                <a href="#roster">ROSTER</a>
                <a href="#sponsors">SPONSORS</a>
            </nav>
        </div>
    </header>

    <!-- メインビジュアル -->
    <section id="home" class="hero">
        <!-- チームロゴ画像を指定通り配置 -->
        <img src="IMG_20260628_134344.png" alt="daydream Team Logo" class="team-logo-main">
        <p>
            独自のスタイルで頂点を目指す、新進気鋭のeスポーツチーム。
            圧倒的なプレイングと強固な絆を武器に、競技シーンに新たな風を吹き込みます。
        </p>
    </section>

    <!-- メンバー紹介セクション -->
    <section id="roster" class="section">
        <div class="section-title">Roster</div>
        <div class="roster-grid">
            <div class="member-card">
                <div class="member-role">In-Game Leader</div>
                <div class="member-name">Player_1</div>
                <a href="#" class="btn-sns">X (Twitter)</a>
            </div>
            <div class="member-card">
                <div class="member-role">Fragger</div>
                <div class="member-name">Player_2</div>
                <a href="#" class="btn-sns">X (Twitter)</a>
            </div>
            <div class="member-card">
                <div class="member-role">Support</div>
                <div class="member-name">Player_3</div>
                <a href="#" class="btn-sns">X (Twitter)</a>
            </div>
            <div class="member-card">
                <div class="member-role">Manager</div>
                <div class="member-name">Manager</div>
                <a href="#" class="btn-sns">X (Twitter)</a>
            </div>
        </div>
    </section>

    <!-- スポンサーセクション -->
    <section id="sponsors" class="sponsors">
        <div class="section-title" style="margin-bottom: 20px;">Sponsors</div>
        <div class="sponsor-grid">
            <!-- スポンサーロゴ画像を指定通り配置 -->
            <div class="sponsor-card">
                <img src="20260628_133638.jpg" alt="鳥栄 Logo" class="sponsor-logo">
            </div>
        </div>
    </section>

    <!-- フッター -->
    <footer>
        &copy; 2026 daydream eSports. All Rights Reserved.
    </footer>

</body>
</html>
